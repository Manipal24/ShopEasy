<!DOCTYPE html>
<html>

<head>
    <title>Cart - ShopEasy</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }

        .navbar {
            background: #ff6600;
            padding: 15px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            margin: 0;
        }

        .back-btn {
            background: white;
            color: #ff6600;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            color: gray;
            font-size: 20px;
        }

        .cart-item {
            background: white;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .item-name {
            font-weight: bold;
            font-size: 16px;
        }

        .item-price {
            color: green;
            font-weight: bold;
        }

        .item-qty {
            color: gray;
            font-size: 14px;
        }

        .remove-btn {
            background: red;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .total-box {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: right;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .total-box h2 {
            margin: 0 0 15px;
            color: #333;
        }

        .order-btn {
            background: #ff6600;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        .order-btn:hover {
            background: #e55500;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h1>🛒 Cart</h1>
        <a href="/"><button class="back-btn">← Shop</button></a>
    </div>

    <div class="container">

        {% if cart %}
        {% for item in cart %}
        <div class="cart-item">
            <div>
                <div class="item-name">{{ item.name }}</div>
                <div class="item-qty">Qty: {{ item.qty }}</div>
                <div class="item-price">₹{{ item.price * item.qty }}</div>
            </div>
            <button class="remove-btn" onclick="removeItem({{ item.id }})">Remove</button>
        </div>
        {% endfor %}

        <div class="total-box">
            <h2>Total: ₹{{ total }}</h2>
            <button class="order-btn" onclick="placeOrder()">✅ Place Order</button>
        </div>

        {% else %}
        <div class="empty">
            <p>🛒 Cart empty!</p>
            <a href="/"><button
                    style="background:#ff6600; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-size:16px;">Shop
                    Now</button></a>
        </div>
        {% endif %}

    </div>

    <script>
        function removeItem(id) {
            fetch('/remove-from-cart', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            })
                .then(res => res.json())
                .then(data => {
                    location.reload();
                });
        }

        function placeOrder() {
            fetch('/place-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    window.location.href = '/';
                });
        }
    </script>

</body>

</html>
